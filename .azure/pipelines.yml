trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  pythonVersion: "3.12"

stages:
  - stage: Lint
    displayName: Lint
    jobs:
      - job: Ruff
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)

          - script: pip install uv
            displayName: Install uv

          - script: uv sync --extra all
            displayName: Install dependencies

          - script: uv run ruff check src/ tests/
            displayName: Ruff check

          - script: uv run ruff format --check src/ tests/
            displayName: Ruff format check

  - stage: Test
    displayName: Test
    dependsOn: Lint
    jobs:
      - job: UnitTests
        strategy:
          matrix:
            Python310:
              pythonVersion: "3.10"
            Python311:
              pythonVersion: "3.11"
            Python312:
              pythonVersion: "3.12"
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)

          - script: |
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
              source "$HOME/.cargo/env"
            displayName: Install Rust

          - script: pip install uv
            displayName: Install uv

          - script: uv sync --extra all
            displayName: Install dependencies

          - script: |
              source "$HOME/.cargo/env"
              cd src/burnt-engine
              uv run maturin develop --release
            displayName: Build Rust extension

          - script: uv run pytest tests/unit/ -v --tb=short -m "not integration"
            displayName: Run unit tests

          - task: PublishTestResults@2
            inputs:
              testResultsFiles: "**/test-results.xml"
              testRunTitle: "Python $(pythonVersion)"
            condition: always()

  - stage: Build
    displayName: Build Wheels
    dependsOn: Test
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: BuildWheel
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)

          - script: |
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
              source "$HOME/.cargo/env"
            displayName: Install Rust

          - script: |
              pip install maturin
              source "$HOME/.cargo/env"
              cd src/burnt-engine
              maturin build --release --out ../../dist/
            displayName: Build wheel

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: dist/
              ArtifactName: wheels
