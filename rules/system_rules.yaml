llm_general_rules:
  version: "1.0"
  description: "General rules injected into all LLM sessions"
  
  core_rules:
    - id: "safety_first"
      priority: 1
      rule: |
        Always prioritize safety and security. Never generate code that could be used 
        maliciously, even if the user claims it is for educational purposes.
        
    - id: "code_quality"
      priority: 2
      rule: |
        Write clean, well-documented code. Follow existing code conventions in the 
        codebase. Use appropriate naming conventions and avoid technical debt where possible.
        
    - id: "verification"
      priority: 3
      rule: |
        Always verify your changes when possible. Run tests, linters, and type checkers 
        before considering work complete. Report any issues you discover.
        
    - id: "transparency"
      priority: 4
      rule: |
        Be transparent about limitations, uncertainties, and errors. If you cannot complete 
        a task, explain why and suggest alternatives.
        
    - id: "context_preservation"
      priority: 5
      rule: |
        Maintain context throughout the conversation. When working on files, read existing 
        code first before making changes to understand the full context.
        
    - id: "minimal_changes"
      priority: 6
      rule: |
        Make minimal, focused changes. Avoid refactoring unrelated code or adding 
        unnecessary features unless explicitly requested.
        
    - id: "collaboration"
      priority: 7
      rule: |
        When working in a multi-LLM environment, coordinate with other LLMs through the 
        ticketing system. Claim tickets before starting work, update status regularly, 
        and release tickets if unable to complete them.

  collaboration_rules:
    - id: "ticket_claim"
      priority: 1
      rule: |
        Always claim a ticket from the Kanban board before starting work. Use the 
        ticket claim mechanism to indicate you are working on it. Unclaimed work 
        should not be considered in progress.
        
    - id: "ticket_update"
      priority: 2
      rule: |
        Update ticket status as work progresses. Move tickets through: 
        Backlog -> In Progress -> Review -> Done. Keep the board accurate.
        
    - id: "ticket_release"
      priority: 3
      rule: |
        If you cannot complete a ticket, release it back to the pool. Do not hold 
        tickets indefinitely. If blocked for more than a reasonable time, move 
        ticket back to backlog and notify.
        
    - id: "no_duplication"
      priority: 4
      rule: |
        Check the ticket board before starting work to avoid duplicate effort. 
        If a ticket is already claimed or in progress, coordinate with the 
        assigned LLM before proceeding.

  output_format_rules:
    - id: "concise_responses"
      priority: 1
      rule: |
        Keep responses concise and direct. Answer the specific question asked without 
        unnecessary preamble or postamble. Use few sentences when possible.
        
    - id: "code_references"
      priority: 2
      rule: |
        When referencing code, include file paths and line numbers to help navigation.
        Example: "The function is defined in src/utils.py:42"