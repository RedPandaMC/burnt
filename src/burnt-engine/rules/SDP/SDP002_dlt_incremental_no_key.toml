# SDP002 - Incremental table without primary key
# Category: Dlt
# Severity: warning
# Language: python

[rule]
id = "dlt_incremental_no_key"
code = "SDP002"
severity = "warning"
language = "python"
description = "SDP incremental table defined without a primary key"
suggestion = "Add keys= parameter to @dlt.table or use APPLY CHANGES INTO"
category = "SDP"

[query]
# CPL pattern - matches @dlt.table decorator
cpl_detect = """
@dlt.table()
def $func():
"""
