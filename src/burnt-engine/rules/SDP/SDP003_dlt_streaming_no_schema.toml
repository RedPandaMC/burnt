# SDP003 - Streaming source without explicit schema
# Category: Dlt
# Severity: warning
# Language: python

[rule]
id = "dlt_streaming_no_schema"
code = "SDP003"
severity = "warning"
language = "python"
description = "Streaming source missing explicit schema — schema inference on streams is unreliable"
suggestion = "Pass schema= to spark.readStream or use cloudFiles with schemaLocation"
category = "SDP"

[query]
# CPL pattern - matches readStream method calls
cpl_detect = """
$df.readStream()
$method == "readStream"
"""

