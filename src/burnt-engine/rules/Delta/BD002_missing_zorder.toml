# BD002 - OPTIMIZE without ZORDER
# Category: Delta
# Severity: info
# Language: sql

[rule]
id = "missing_zorder"
code = "BD002"
severity = "info"
language = "sql"
description = "Large Delta table missing ZORDER optimization"
suggestion = "Add ZORDER BY on frequently filtered columns"
category = "Delta"

[query]
# CPL pattern - matches OPTIMIZE without ZORDER BY
cpl_detect = """
OPTIMIZE $tbl
"""

# CPL exclude - OPTIMIZE with ZORDER BY is OK
cpl_exclude = """
OPTIMIZE $tbl
ZORDER BY $col
"""

