# BP009 - SELECT * without LIMIT
# Category: BestPractice
# Severity: error
# Language: sql

[rule]
id = "select_star"
code = "BP009"
severity = "error"
language = "sql"
description = "SELECT * without LIMIT returns all rows and prevents column pruning"
suggestion = "Add LIMIT clause or select specific columns"
category = "BestPractice"

[query]
# CPL pattern - matches SELECT * without LIMIT
cpl_detect = """
SELECT *
FROM $tbl
"""

# CPL exclude - SELECT * with LIMIT is OK
cpl_exclude = """
SELECT *
FROM $tbl
LIMIT $n
"""

