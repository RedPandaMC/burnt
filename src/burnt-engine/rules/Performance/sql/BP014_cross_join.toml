# BP014 - CROSS JOIN (SQL)
# Category: BestPractice
# Severity: warning
# Language: sql

[rule]
id = "cross_join"
code = "BP014"
severity = "warning"
language = "sql"
description = "CROSS JOIN creates O(n*m) rows"
suggestion = "Use INNER JOIN with explicit ON clause"
category = "BestPractice"

[query]
# CPL pattern - matches CROSS JOIN
cpl_detect = """
SELECT *
FROM $a
CROSS JOIN $b
"""

