# BP008 - collect() without limit()
# Category: BestPractice
# Severity: error
# Language: python

[rule]
id = "collect_without_limit"
code = "BP008"
severity = "error"
language = "python"
description = "collect() without limit() can OOM the driver"
suggestion = "Add .limit(n).collect() or use .take(n)"
category = "BestPractice"

[query]
# CPL pattern - matches df.collect()
cpl_detect = """
$df.collect()
$method == "collect"
"""

# CPL exclude - df.limit().collect() is OK
# Note: Simplified pattern - just match the chain without nested method predicates
cpl_exclude = """
$df.limit().collect()
"""

[tests]
pass = [
    "df.limit(100).collect()",
    "df.take(10)",
]
fail = [
    "df.collect()",
]
