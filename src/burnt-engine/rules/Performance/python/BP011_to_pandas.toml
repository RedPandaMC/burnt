# BP011 - toPandas() brings all data to driver
# Category: BestPractice
# Severity: error
# Language: python

[rule]
id = "to_pandas"
code = "BP011"
severity = "error"
language = "python"
description = "toPandas() brings the entire DataFrame to the driver"
suggestion = "Add .limit(n).toPandas() or use Spark-native aggregations"
category = "BestPractice"

[query]
# CPL pattern - matches df.toPandas()
cpl_detect = """
$df.toPandas()
$method == "toPandas"
"""

# CPL exclude - df.limit().toPandas() is OK
# Note: Simplified pattern - just match the chain without nested method predicates
cpl_exclude = """
$df.limit().toPandas()
"""

