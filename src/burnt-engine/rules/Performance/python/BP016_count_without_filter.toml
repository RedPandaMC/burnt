# BP016 - count() without filter/where
# Category: BestPractice
# Severity: warning
# Language: python

[rule]
id = "count_without_filter"
code = "BP016"
severity = "warning"
language = "python"
description = "count() without filter scans the entire table"
suggestion = "Apply .filter() or .where() before count()"
category = "BestPractice"

[query]
cpl_detect = """
$df.count()
$method == "count"
"""

# CPL exclude - df.filter().count() or df.where().count() is OK
cpl_exclude = """
$df.filter().count()
"""
