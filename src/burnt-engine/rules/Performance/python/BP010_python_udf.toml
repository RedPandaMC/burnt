# BP010 - Python UDF (10-100x overhead vs Pandas UDF)
# Category: BestPractice
# Severity: error
# Language: python

[rule]
id = "python_udf"
code = "BP010"
severity = "error"
language = "python"
description = "Python UDF has 10-100x overhead vs Pandas UDF"
suggestion = "Use @pandas_udf for vectorized operations"
category = "BestPractice"

[query]
# CPL pattern - matches udf() call
cpl_detect = """
udf()
$func_name == "udf"
"""

# Note: Also need to detect spark.udf.register() which requires
# multi-level attribute matching. Simplified for now.