# BNT-C01 - df['col'] or df.col outside a join can cause stale reference bugs
# Category: NotebookStyle
# Severity: warning
# Language: python

[rule]
id = "df_bracket_or_dot_reference"
code = "BNT-C01"
severity = "warning"
language = "python"
description = "df['col'] or df.col outside a join can cause stale reference bugs after withColumn"
suggestion = "Use F.col('col') which resolves at evaluation time"
category = "NotebookStyle"

[query]
cpl_detect = [
    """
    $df[$col]
    """,
    """
    $df.$col
    """
]
