# BNT-N01 - Variable named df/df1-df9 is too generic
# Category: NotebookStyle
# Severity: style
# Language: python

[rule]
id = "generic_dataframe_variable_name"
code = "BNT-N01"
severity = "style"
language = "python"
description = "Variable named df/df1-df9 is too generic — hinders readability"
suggestion = "Use a descriptive name: orders_df, customers, filtered_events"
category = "NotebookStyle"

[query]
# CPL pattern - matches df, df1, df2, etc.
# Note: Full detection requires variable naming context analysis
cpl_detect = """
$df = $expr
$var_name =~ "^df\\d*$"
"""
