[rule]
id = "union_not_all"
code = "BQ002"
severity = "warning"
language = "sql"
description = "UNION deduplicates rows with an expensive sort — use UNION ALL if duplicates are acceptable"
suggestion = "Replace UNION with UNION ALL"
category = "SqlQuality"
tags = ["sql", "performance", "dedup"]

[query]
detect = """
; Detect UNION without ALL
(union
  operator: (operator) @op
  (#eq? @op "UNION"))

; Also detect set operation without ALL
(set_operation
  operator: (identifier) @op
  (#eq? @op "UNION")
  (keyword) @all
  (#not-eq? @all "ALL"))
"""

