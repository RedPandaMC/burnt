[rule]
id = "cartesian_product"
code = "SQ003"
severity = "error"
language = "sql"
description = "Cartesian product detected"
suggestion = "Add appropriate join condition"
category = "SqlQuality"
tags = ["sql", "join", "cartesian"]

[query]
detect = """
; Detect cross join (JOIN without ON clause)
(join
  condition: (nil) @no_condition
  (#eq? @no_condition "nil"))
"""

