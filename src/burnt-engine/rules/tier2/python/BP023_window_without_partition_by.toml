# BP023 - Window.orderBy() without .partitionBy() causes global sort
# Category: BestPractice
# Severity: warning
# Language: python
# Tier: 2

[rule]
id = "window_without_partition_by"
code = "BP023"
severity = "warning"
language = "python"
description = "Window.orderBy() without .partitionBy() causes global sort"
suggestion = "Add .partitionBy() before .orderBy() or use .orderBy().limit()"
category = "BestPractice"
tier = 2

[query]
detect = """
(call
  function: (attribute
    object: (call
      function: (attribute
        object: (identifier) @window_obj
        attribute: (identifier) @window_method
      )
      (#eq? @window_obj "Window")
      (#eq? @window_method "orderBy")
    )
    attribute: (identifier) @final_method
  )
)
"""
exclude = """
(call
  function: (attribute
    object: (call
      function: (attribute
        object: (call
          function: (identifier) @partition_method
          arguments: (argument_list)
        )
        (#eq? @partition_method "partitionBy")
      )
    )
    attribute: (identifier) @order_method
  )
)
"""
