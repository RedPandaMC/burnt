# SQ002 - CROSS JOIN without explicit condition
# Category: SqlQuality
# Severity: warning
# Language: sql
# Tier: 2

[rule]
id = "cross_join"
code = "SQ002"
severity = "warning"
language = "sql"
description = "CROSS JOIN without explicit condition"
suggestion = "Use INNER JOIN with explicit condition"
category = "SqlQuality"
tier = 2

[query]
detect = """
(join_clause
  (cross_join)
)
"""
