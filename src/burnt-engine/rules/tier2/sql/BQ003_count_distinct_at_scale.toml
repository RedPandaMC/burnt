# BQ003 - COUNT(DISTINCT col) requires full shuffle and sort
# Category: SqlQuality
# Severity: info
# Language: sql
# Tier: 2

[rule]
id = "count_distinct_at_scale"
code = "BQ003"
severity = "info"
language = "sql"
description = "COUNT(DISTINCT col) requires full shuffle and sort — expensive at scale"
suggestion = "Consider approx_count_distinct() for large datasets where exact count is not required"
category = "SqlQuality"
tier = 2

[query]
detect = """
(function_call
  function: (identifier) @func
  arguments: (argument_list
    (keyword_argument
      argument: (identifier) @col
    )
  )
  (#eq? @func "count_distinct")
)
"""
