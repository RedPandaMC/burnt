# SQ001 - SELECT * without LIMIT (SQL context-aware)
# Category: SqlQuality
# Severity: warning
# Language: sql
# Tier: 2

[rule]
id = "select_star"
code = "SQ001"
severity = "warning"
language = "sql"
description = "SELECT * without LIMIT"
suggestion = "Add LIMIT or specify columns"
category = "SqlQuality"
tier = 2

[query]
detect = """
(select_statement
  select: (select_clause
    (star)
  )
)
"""
exclude = """
(select_statement
  select: (select_clause
    (star)
  )
  (limit_clause)
)
"""
