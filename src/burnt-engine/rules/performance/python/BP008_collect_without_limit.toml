# BP008 - collect() without limit()
## Rule: BP008
## Description: collect() without limit() can OOM the driver
## Severity: error
## Category: Performance
## Tags: ["pyspark", "memory", "driver-bound"]

[rule]
id = "collect_without_limit"
code = "BP008"
severity = "error"
language = "python"
description = "collect() without limit() can OOM the driver"
suggestion = "Add .limit(n).collect() or use .take(n)"
category = "BestPractice"

[query]
detect = """
; Detects df.collect() without limit
(call
  function: (attribute
    object: (_) @df
    attribute: (identifier) @method)
  (#eq? @method "collect"))
"""
exclude = """
; Detect df.limit().collect() pattern
(call
  function: (attribute
    object: (call
      function: (attribute
        object: (_) @df
        attribute: (identifier) @limit_method))
    attribute: (identifier) @collect_method)
  (#eq? @collect_method "collect")
  (#eq? @limit_method "limit"))
"""


[tests]
pass = [
    "df.limit(100).collect()",
    "df.take(10)",
]
fail = [
    "df.collect()",
]
