# BQ002 - UNION instead of UNION ALL (forces dedup sort)
# Category: SqlQuality
# Severity: warning
# Language: sql

[rule]
id = "union_not_all"
code = "BQ002"
severity = "warning"
language = "sql"
description = "UNION deduplicates rows with an expensive sort — use UNION ALL if duplicates are acceptable"
suggestion = "Replace UNION with UNION ALL"
category = "SqlQuality"

[query]
# CPL pattern - matches UNION (without ALL)
cpl_detect = """
SELECT * FROM $a
UNION
SELECT * FROM $b
"""

# CPL exclude - UNION ALL is OK
cpl_exclude = """
SELECT * FROM $a
UNION ALL
SELECT * FROM $b
"""

