# SQ001 - SELECT * without LIMIT (SQL context-aware)
# Category: SqlQuality
# Severity: warning
# Language: sql

[rule]
id = "select_star"
code = "SQ001"
severity = "warning"
language = "sql"
description = "SELECT * without LIMIT"
suggestion = "Add LIMIT or specify columns"
category = "SqlQuality"

[query]
cpl_detect = """
SELECT * FROM $table
"""

cpl_exclude = """
SELECT * FROM $table LIMIT $n
"""
