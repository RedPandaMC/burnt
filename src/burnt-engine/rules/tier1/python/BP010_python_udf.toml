# BP010 - Python UDF (10-100x overhead vs Pandas UDF)
# Category: BestPractice
# Severity: error
# Language: python
# Tier: 1

[rule]
id = "python_udf"
code = "BP010"
severity = "error"
language = "python"
description = "Python UDF has 10-100x overhead vs Pandas UDF"
suggestion = "Use @pandas_udf for vectorized operations"
category = "BestPractice"
tier = 1

[query]
detect = [
"""
(call
  function: (identifier) @func_name
  (#eq? @func_name "udf")
)
""",
"""
(call
  function: (attribute
    object: (attribute
      object: (identifier) @spark_var
      attribute: (identifier) @udf_module
    )
    attribute: (identifier) @register_method
  )
  (#eq? @spark_var "spark")
  (#eq? @udf_module "udf")
  (#eq? @register_method "register")
)
"""
]

