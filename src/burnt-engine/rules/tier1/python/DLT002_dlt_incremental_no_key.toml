# DLT002 - Incremental table without primary key
# Category: Dlt
# Severity: warning
# Language: python
# Tier: 1

[rule]
id = "dlt_incremental_no_key"
code = "DLT002"
severity = "warning"
language = "python"
description = "DLT incremental table defined without a primary key"
suggestion = "Add keys= parameter to @dlt.table or use APPLY CHANGES INTO"
category = "Dlt"
tier = 1

[query]
detect = """
(decorated_definition
  (decorator
    (call
      function: (attribute
        object: (identifier) @dlt_obj
        attribute: (identifier) @decorator_name
      )
      (#eq? @dlt_obj "dlt")
      (#eq? @decorator_name "table")
    )
  )
)
"""

